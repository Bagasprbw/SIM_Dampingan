# Nginx DI HOST VPS — untuk subdomain + HTTPS (setelah DNS mengarah ke IP VPS)
# Copy: sudo cp docker/nginx/host-reverse-proxy.example.conf /etc/nginx/sites-available/sim-dampingan
#       sudo ln -s /etc/nginx/sites-available/sim-dampingan /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# SSL:  sudo certbot --nginx -d sim.domainkamu.com
#
# Prasyarat: Docker APP_PORT=80 (lihat .env.vps.example)

server {
    listen 443 ssl http2;
    server_name sim.domainkamu.com;

    ssl_certificate     /etc/letsencrypt/live/sim.domainkamu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sim.domainkamu.com/privkey.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name sim.domainkamu.com;
    return 301 https://$host$request_uri;
}
